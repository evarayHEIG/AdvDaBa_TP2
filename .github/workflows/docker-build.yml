name: Build and Push Docker Image

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Lowercase Repository Name
        id: repo_name
        run: |
          echo "image_name=$(echo ${{ github.repository_owner }}/advdaba-tp2 | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        # ... (votre config Java)

      - name: Build with Maven
        run: mvn clean package -DskipTests -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # --- MODIFIEZ LES TAGS ICI ---
          tags: |
            ghcr.io/${{ steps.repo_name.outputs.image_name }}:latest
            ghcr.io/${{ steps.repo_name.outputs.image_name }}:${{ github.sha }}
