services:
  db:
    image: neo4j:4.4.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - $PWD/neo4j_mount/data:/data
      - $PWD/neo4j_mount/logs:/logs
      - $PWD/neo4j_mount/conf:/conf
    environment:
      - NEO4J_AUTH=neo4j/test
    deploy:
      resources:
        limits:
          memory: 3g

  app:
    image: neo4jtp:latest
    depends_on:
      - db
    volumes:
      - $PWD/dblpExample.jsonl:/file.jsonl
    environment:
      #- JSON_FILE=http://vmrum.isc.heia-fr.ch/files/test.jsonl
      - JSON_FILE=http://vmrum.isc.heia-fr.ch/files/DBLP-Citation-network-V18.jsonl
      - MAX_NODES=1000000
      - BATCH_SIZE=15000
      - NEO4J_IP=db
    deploy:
      resources:
        limits:
          memory: 3g
